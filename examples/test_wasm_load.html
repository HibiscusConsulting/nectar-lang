<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>WASM Debug</title></head>
<body style="background:#09090b;color:#fafafa;font-family:system-ui;padding:20px">
<div id="app"></div>
<pre id="log" style="color:#3fb950"></pre>
<script type="module">
const log = s => { document.getElementById('log').textContent += s + '\n'; console.log(s); };
try {
    log('1. Loading core.js...');
    const mod = await import('../runtime/modules/core.js');
    log('2. core.js loaded');
    log('3. Instantiating WASM...');
    const inst = await mod.instantiate('./filter-sort-demo.wasm');
    log('4. instantiate returned');
    log('5. exports: ' + Object.keys(inst.exports).join(', '));
    log('6. DOM #app innerHTML length: ' + document.getElementById('app').innerHTML.length);
    log('7. DOM #app childElementCount: ' + document.getElementById('app').childElementCount);
    if (document.getElementById('app').childElementCount === 0) {
        log('8. Trying manual __init_all...');
        inst.exports.__init_all();
        log('9. __init_all done');
        log('10. DOM #app childElementCount: ' + document.getElementById('app').childElementCount);
    }
} catch(e) {
    log('ERROR: ' + e.message);
    log('Stack: ' + (e.stack || '').split('\n').slice(0,5).join('\n'));
}
</script>
</body>
</html>
