<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Svelte 5 — 10K Product Benchmark</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#09090b;color:#fafafa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;line-height:1.5}
nav{position:fixed;top:0;left:0;width:100%;height:48px;background:#0d1117;border-bottom:1px solid #21262d;display:flex;align-items:center;padding:0 16px;z-index:100}
nav .logo{color:#f97316;font-size:16px;font-weight:700;text-decoration:none;margin-right:auto}
nav .links{display:flex;gap:4px}
nav .links a{color:#8b949e;text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:6px;transition:color 150ms,background 150ms}
nav .links a:hover{color:#fafafa;background:rgba(255,255,255,0.06)}
nav .links a.active{color:#fafafa;background:rgba(249,115,22,0.12)}
.promo{height:36px;background:#1a1400;display:flex;align-items:center;justify-content:center;font-size:13px;color:#ffa11e;font-weight:500}
.page{max-width:1280px;margin:0 auto;padding:32px 32px 32px}
.breadcrumbs{display:flex;gap:6px;font-size:13px;color:#71717a;margin-bottom:20px}
.breadcrumbs .current{color:#a1a1aa}
.header{margin-bottom:20px}
.header h1{font-size:32px;font-weight:800;color:#fafafa;margin-bottom:4px}
.header p{font-size:14px;color:#71717a}
.search{background:#18181b;border:1px solid #27272a;color:#52525b;padding:14px;border-radius:10px;width:100%;font-size:14px;margin-bottom:20px;outline:none}
.search:focus{border-color:#ffa11e;color:#fafafa}
.filters{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:24px}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:8px 16px;border-radius:20px;background:#18181b;color:#a1a1aa;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all 150ms}
.pill:hover{color:#fafafa;background:#27272a}
.pill.active{background:#ffa11e;color:#000}
.spacer{flex:1}
.sort-group{display:flex;gap:6px;align-items:center}
.sort-label{font-size:12px;color:#52525b}
.sort-btn{padding:6px 12px;border-radius:6px;background:#18181b;color:#a1a1aa;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all 150ms}
.sort-btn:hover{color:#fafafa}
.sort-btn.active{background:#ffa11e;color:#000}
.metrics{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.metric{background:#18181b;border:1px solid #27272a;border-radius:10px;padding:12px;min-width:180px;flex:1}
.metric .label{font-size:10px;font-weight:600;color:#52525b;text-transform:uppercase;letter-spacing:0.5px}
.metric .value{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;font-family:"SF Mono",SFMono-Regular,Consolas,monospace}
.mv-green{color:#10b981}.mv-blue{color:#58a6ff}.mv-orange{color:#ffa11e}.mv-purple{color:#bc8cff}
.grid{display:flex;flex-wrap:wrap;gap:20px}
.card{width:280px;background:#18181b;border:1px solid #27272a;border-radius:12px;overflow:hidden;content-visibility:auto;contain-intrinsic-size:0 400px}
.card-img{height:190px;overflow:hidden;background:#111}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:14px;display:flex;flex-direction:column;gap:5px}
.card-name{font-size:15px;font-weight:600;color:#fafafa}
.card-cat{font-size:12px;color:#71717a}
.card-rating{font-size:12px;color:#f59e0b}
.card-price-row{display:flex;align-items:center;gap:8px}
.card-price{font-size:18px;font-weight:700;color:#fafafa}
.card-stock{font-size:10px;font-weight:600;color:#10b981;background:#052e16;padding:2px 6px;border-radius:4px;margin-left:auto}
.add-btn{padding:12px;border:none;border-radius:8px;background:#ffa11e;color:#000;font-weight:600;font-size:13px;cursor:pointer;min-height:44px;transition:background 150ms}
.add-btn:hover{background:#ffb73d}
.footer{text-align:center;padding:24px;font-size:11px;color:#52525b}
@media(max-width:768px){.metric{min-width:140px}.card{width:100%}}
</style>
<meta http-equiv="Cache-Control" content="no-store">
<script>window.__t0 = performance.now();</script>
</head>
<body>
<nav>
  <a href="/" class="logo">Nectar</a>
  <div class="links">
    <a href="/app/canvas">E-Commerce</a>
    <a href="/app/data-table">Data Table</a>
    <a href="/app/trading">Trading</a>
    <a href="/app/svelte" class="active">Svelte 5</a>
    <a href="/docs/getting-started">Docs</a>
    <a href="https://github.com/HibiscusConsulting/nectar-lang" target="_blank">GitHub</a>
    <a href="/">Home</a>
  </div>
</nav>
<div style="height:48px"></div>
<div class="promo">Svelte 5 comparison — same 10,000 products, same design, DOM rendering</div>
<div class="page" id="app"></div>
<script type="module">
const T0 = window.__t0;
const T_SCRIPTS = performance.now();

// ── Product names (matching Nectar demo) ─────────────────────
const NAMES = ['Wireless Earbuds','Cotton Crew Tee','Smart Home Hub','Running Shoes','Best Sellers Vol.','USB-C Charger','Denim Jacket','LED Desk Lamp','Yoga Mat','Sci-Fi Novel','Noise-Cancel Headphones','Linen Button-Down','Air Purifier','Trail Backpack','Cookbook','Mechanical Keyboard','Wool Sweater','Coffee Maker','Dumbbells','Programming Guide'];
const CATS = ['Electronics','Clothing','Home','Sports','Books'];
const RATINGS = ['★★★★☆ 4.0','★★★★★ 5.0','★★★★☆ 4.3','★★★☆☆ 3.7','★★★★☆ 4.6'];

async function fetchProducts() {
  const res = await fetch('/api/products?per_page=10000&v=' + Date.now());
  const data = await res.json();
  return data.map((p, i) => ({
    id: p.id,
    name: p.name,
    category: p.category,
    priceCents: p.price_cents,
    priceDisplay: '$' + Math.floor(p.price_cents / 100) + '.' + (p.price_cents % 100 < 10 ? '0' : '') + (p.price_cents % 100),
    rating: RATINGS[i % 5],
    stock: p.stock_status === 'out_of_stock' ? 'Sold Out' : p.stock_status === 'low_stock' ? 'Low Stock' : 'In Stock',
    img: p.image_url,
  }));
}

// ── App ──────────────────────────────────────────────────────
const app = document.getElementById('app');
const products = await fetchProducts();
const T_BUILD = performance.now();

let activeCat = 'All';
let sortMode = 'Default';
let cartCount = 0;
const cardEls = [];
const pillEls = [];
const sortEls = [];
const metricEls = {};

// ── Metrics ──────────────────────────────────────────────────
const metricsRow = el('div','metrics');
[['heap','HEAP INIT','mv-green'],['total','TOTAL INIT','mv-blue'],['products','PRODUCTS','mv-blue'],['cart','CART','mv-orange'],['lastOp','LAST OP','mv-purple'],['filter','FILTER','mv-green']].forEach(([k,label,cls]) => {
  const m = el('div','metric');
  const l = el('div','label'); l.textContent = label;
  const v = el('div','value ' + cls); v.textContent = '—';
  m.append(l, v); metricsRow.appendChild(m);
  metricEls[k] = v;
});
app.appendChild(metricsRow);

// ── Breadcrumbs ──────────────────────────────────────────────
const bc = el('div','breadcrumbs');
bc.innerHTML = 'Home <span style="color:#52525b">/</span> Shop <span style="color:#52525b">/</span> <span class="current">All</span>';
const bcCurrent = bc.querySelector('.current');
app.appendChild(bc);

// ── Header ───────────────────────────────────────────────────
const header = el('div','header');
header.innerHTML = '<h1>Shop All Products</h1><p>' + products.length + ' items · Fetched from API · Svelte 5 imperative DOM</p>';
app.appendChild(header);

// ── Search ───────────────────────────────────────────────────
const search = document.createElement('input');
search.className = 'search'; search.placeholder = 'Search products...';
app.appendChild(search);

// ── Filters ──────────────────────────────────────────────────
const filtersRow = el('div','filters');
const pillsDiv = el('div','pills');
['All','Electronics','Clothing','Home','Sports','Books'].forEach(cat => {
  const btn = el('button', cat === 'All' ? 'pill active' : 'pill');
  btn.textContent = cat;
  btn.onclick = () => filterCat(cat);
  pillsDiv.appendChild(btn);
  pillEls.push({ el: btn, cat });
});
filtersRow.appendChild(pillsDiv);
filtersRow.appendChild(el('div','spacer'));
const sortGroup = el('div','sort-group');
const sl = el('span','sort-label'); sl.textContent = 'Sort:';
sortGroup.appendChild(sl);
[['price-asc','Price ↑'],['price-desc','Price ↓'],['name-asc','Name A→Z']].forEach(([order,label]) => {
  const btn = el('button','sort-btn');
  btn.textContent = label;
  btn.onclick = () => sortProducts(order);
  sortGroup.appendChild(btn);
  sortEls.push({ el: btn, order });
});
filtersRow.appendChild(sortGroup);
app.appendChild(filtersRow);

// ── Product grid ─────────────────────────────────────────────
const grid = el('div','grid');
for (const p of products) {
  const card = el('div','card');
  card.dataset.cat = p.category;
  card.innerHTML = '<div class="card-img"><img src="' + p.img + '" width="280" height="190"></div><div class="card-body"><div class="card-name">' + p.name + '</div><div class="card-cat">' + p.category + '</div><div class="card-rating">' + p.rating + '</div><div class="card-price-row"><span class="card-price">' + p.priceDisplay + '</span><span class="card-stock">' + p.stock + '</span></div><button class="add-btn">Add to Cart</button></div>';
  card.querySelector('.add-btn').onclick = () => addToCart();
  grid.appendChild(card);
  cardEls.push(card);
}
app.appendChild(grid);

// ── Footer ───────────────────────────────────────────────────
const footer = el('div','footer');
footer.textContent = 'Svelte 5 imperative DOM · JavaScript · 10,000 products';
app.appendChild(footer);

// ── Timings ──────────────────────────────────────────────────
const T_RENDER = performance.now();
const heapMs = (T_BUILD - T_SCRIPTS).toFixed(1) + 'ms';
metricEls.heap.textContent = heapMs;
metricEls.total.textContent = (T_RENDER - T0).toFixed(1) + 'ms';
metricEls.products.textContent = '10000';
metricEls.cart.textContent = '0';
metricEls.filter.textContent = 'All';


// ── Handlers ─────────────────────────────────────────────────
function addToCart() {
  const t = performance.now();
  cartCount++;
  metricEls.cart.textContent = cartCount;
  requestAnimationFrame(() => {
    metricEls.lastOp.textContent = (performance.now() - t).toFixed(2) + 'ms';
  });
}

function filterCat(cat) {
  const t = performance.now();
  activeCat = cat;
  const all = cat === 'All';
  let visible = 0;
  for (const card of cardEls) {
    const show = all || card.dataset.cat === cat;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  }
  pillEls.forEach(p => p.el.className = p.cat === cat ? 'pill active' : 'pill');
  metricEls.filter.textContent = cat;
  metricEls.products.textContent = visible;
  bcCurrent.textContent = cat;
  requestAnimationFrame(() => {
    metricEls.lastOp.textContent = (performance.now() - t).toFixed(2) + 'ms';
  });
}

function sortProducts(order) {
  const t = performance.now();
  sortMode = order;
  const sorted = [...products];
  if (order === 'price-asc') sorted.sort((a, b) => a.priceCents - b.priceCents);
  else if (order === 'price-desc') sorted.sort((a, b) => b.priceCents - a.priceCents);
  else if (order === 'name-asc') sorted.sort((a, b) => a.name.localeCompare(b.name));
  grid.innerHTML = '';
  cardEls.length = 0;
  for (const p of sorted) {
    const card = el('div','card');
    card.dataset.cat = p.category;
    card.innerHTML = '<div class="card-img"><img src="' + p.img + '" width="280" height="190"></div><div class="card-body"><div class="card-name">' + p.name + '</div><div class="card-cat">' + p.category + '</div><div class="card-rating">' + p.rating + '</div><div class="card-price-row"><span class="card-price">' + p.priceDisplay + '</span><span class="card-stock">' + p.stock + '</span></div><button class="add-btn">Add to Cart</button></div>';
    card.querySelector('.add-btn').onclick = () => addToCart();
    grid.appendChild(card);
    cardEls.push(card);
  }
  sortEls.forEach(s => s.el.className = s.order === order ? 'sort-btn active' : 'sort-btn');
  requestAnimationFrame(() => {
    metricEls.lastOp.textContent = (performance.now() - t).toFixed(2) + 'ms';
  });
}

function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
</script>
</body>
</html>
