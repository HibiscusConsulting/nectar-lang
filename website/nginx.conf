server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;

    # WASM mime type
    types {
        application/wasm wasm;
    }

    # Compress text and WASM responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/html
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # API — serve static JSON for the /api/products endpoint the demos hit.
    # Use default_type rather than add_header so we don't get doubled
    # Content-Type headers (which also broke gzip on the response).
    location = /api/products {
        alias /usr/share/nginx/html/app/api/products.json;
        default_type application/json;
        gzip on;
        gzip_types application/json;
        add_header Cache-Control "public, max-age=300";
    }

    # Trailing-slash variants -> canonical no-slash URL.
    # Without this, canvas.html's relative fetch of layout.wasm resolves to
    # /app/canvas/layout.wasm and white-screens.
    location = /app/canvas/      { return 301 /app/canvas$is_args$args; }
    location = /app/svelte/      { return 301 /app/svelte$is_args$args; }
    location = /app/data-table/  { return 301 /app/data-table$is_args$args; }
    location = /app/trading/     { return 301 /app/trading$is_args$args; }

    # Legacy paths that some demo HTMLs link to internally — redirect to /app/*.
    location = /nectar           { return 301 /app/canvas; }
    location = /canvas-test      { return 301 /app/data-table; }
    location = /svelte           { return 301 /app/svelte; }
    location = /trading          { return 301 /app/trading; }

    # Demo route mappings — clean URLs from the marketing homepage.
    location = /app/canvas       { try_files /app/canvas.html =404; }
    location = /app/svelte       { try_files /app/svelte.html =404; }
    location = /app/data-table   { try_files /app/canvas-test.html =404; }
    location = /app/trading      { try_files /app/trading.html =404; }

    # Don't put the internal listening port (8080) in any redirect Location
    # headers; respect the original Host the proxy received.
    port_in_redirect off;
    absolute_redirect off;

    # Documentation: /docs/foo -> /docs/foo.html
    location /docs/ {
        try_files $uri $uri.html $uri/index.html /docs/index.html;
        add_header Cache-Control "public, max-age=300";
    }

    # Long-cache immutable assets
    location ~* \.(wasm|js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Top-level fallback
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    error_page 404 /404.html;
}
