<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayHive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

    /* ===== Shared Layout ===== */
    .ph-layout {
      display: flex;
      min-height: 100vh;
      background-color: #F9FAFB;
    }

    /* Sidebar */
    .ph-sidebar {
      width: 240px;
      min-height: 100vh;
      background-color: #FFFFFF;
      border-right: 1px solid #E5E7EB;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .ph-sidebar-menu-row {
      padding: 0 16px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ph-sidebar-menu-text {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
    }
    .ph-sidebar-collapse-btn {
      font-size: 14px;
      color: #9CA3AF;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px 8px;
    }
    .ph-sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 8px;
    }
    .ph-nav-section-label {
      padding: 16px 12px 6px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #9CA3AF;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .ph-nav-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .ph-nav-item:hover {
      background-color: #F3F4F6;
    }
    .ph-nav-item-active {
      padding: 10px 12px;
      border-radius: 0;
      font-size: 14px;
      font-weight: 600;
      color: #FFFFFF;
      background-color: rgb(82, 82, 91);
      border: none;
      border-left: 4px solid rgb(245, 158, 11);
      cursor: pointer;
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .ph-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      margin-right: 10px;
      pointer-events: none;
    }
    .ph-nav-chevron {
      margin-left: auto;
      font-size: 12px;
      color: #9CA3AF;
    }

    /* Header */
    .ph-layout-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .ph-header {
      height: 56px;
      background-color: #FFFFFF;
      border-bottom: 1px solid #E5E7EB;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .ph-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ph-header-logo {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }
    .ph-header-divider {
      width: 1px;
      height: 20px;
      background-color: #E5E7EB;
    }
    .ph-header-title {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }
    .ph-header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ph-quick-actions-btn {
      padding: 6px 16px;
      background-color: #FFFFFF;
      color: #374151;
      border: 1px solid #D1D5DB;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ph-user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: #F68F1E;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #FFFFFF;
    }

    /* Mobile header */
    .ph-mobile-header {
      display: none;
    }
    .ph-hamburger-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: #111827;
      cursor: pointer;
      padding: 4px;
    }
    .ph-mobile-header-title {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }
    .ph-mobile-user-icon {
      font-size: 24px;
      color: #374151;
      cursor: pointer;
    }

    /* Content area where WASM mounts */
    #app {
      flex: 1;
      padding: 24px;
      background: #F9FAFB;
      min-height: 0;
    }

    /* Active nav highlight via hash */
    .ph-nav-item[data-active="true"] {
      font-weight: 600;
      color: #FFFFFF;
      background-color: #F68F1E;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .ph-sidebar { display: none !important; }
      .ph-header { display: none !important; }
      .ph-mobile-header {
        display: flex !important;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        background-color: #FFFFFF;
        border-bottom: 1px solid #E5E7EB;
      }
      #app { padding: 16px !important; }
    }
  </style>
</head>
<body>
  <div class="ph-layout">
    <!-- ===== SIDEBAR ===== -->
    <aside class="ph-sidebar">
      <div class="ph-sidebar-menu-row">
        <span class="ph-sidebar-menu-text">Menu</span>
        <button class="ph-sidebar-collapse-btn">&laquo;</button>
      </div>
      <nav class="ph-sidebar-nav" id="ph-nav">
        <div class="ph-nav-section-label">NAVIGATION</div>
        <a class="ph-nav-item-active" data-path="/" data-nav="dashboard"><svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
        <a class="ph-nav-item" data-path="/crm/pipeline" data-nav="pipeline"><svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>Pipeline</a>
        <a class="ph-nav-item" data-path="/app/customers" data-nav="storm_leads"><svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 9"/><polyline points="13 11 9 17 15 17 11 23"/></svg>Storm Leads</a>
        <a class="ph-nav-item" data-path="/crm/contacts" data-nav="contacts"><svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Contacts</a>
        <a class="ph-nav-item" data-path="/crm/organizations" data-nav="organizations"><svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>Organizations</a>
        <a class="ph-nav-item" data-path="/app/schedule" data-nav="schedule"><svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</a>
        <a class="ph-nav-item" data-path="/app/invoices" data-nav="quotes"><svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Quotes</a>
        <a class="ph-nav-item" data-path="/app/payments" data-nav="payments"><svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Payments</a>
        <a class="ph-nav-item" data-path="/app/settings" data-nav="settings"><svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
        <a class="ph-nav-item" data-nav="more"><svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>More <span class="ph-nav-chevron">&gt;</span></a>
        <div class="ph-nav-section-label">ADMIN</div>
        <a class="ph-nav-item" data-path="/acct/integrations" data-nav="integrations"><svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Integrations</a>
        <a class="ph-nav-item" data-path="/app/settings" data-nav="crm_settings"><svg class="ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>CRM Settings</a>
      </nav>
    </aside>

    <!-- ===== MAIN ===== -->
    <div class="ph-layout-main">
      <!-- Desktop Header -->
      <header class="ph-header">
        <div class="ph-header-left">
          <span class="ph-header-logo">PayHive</span>
          <div class="ph-header-divider"></div>
          <span class="ph-header-title" id="ph-page-title">Dashboard</span>
        </div>
        <div class="ph-header-actions">
          <button class="ph-quick-actions-btn">Quick Actions</button>
          <div class="ph-user-avatar">BB</div>
        </div>
      </header>

      <!-- Mobile Header -->
      <div class="ph-mobile-header">
        <button class="ph-hamburger-btn">=</button>
        <span class="ph-mobile-header-title">PayHive</span>
        <span class="ph-mobile-user-icon">B</span>
      </div>

      <!-- WASM mounts page content here -->
      <div id="app"></div>
    </div>
  </div>

  <script type="module">
    import { instantiate } from './core.js';
    try {
      document.getElementById('app').innerHTML = '';
      const instance = await instantiate('./app.wasm', {
        test: { pass: () => {}, fail: () => {}, summary: () => {} }
      });
      if (instance.exports.__init_all) {
        instance.exports.__init_all();
      }
      // Wire sidebar nav to WASM router
      const nav = document.getElementById('ph-nav');
      if (nav && instance.exports.__router_navigate) {
        const mem = instance.exports.memory;
        nav.addEventListener('click', (e) => {
          const link = e.target.closest('[data-path]');
          if (!link) return;
          e.preventDefault();
          const path = link.dataset.path;
          console.log('[nav]', path);
          const bytes = new TextEncoder().encode(path);
          const ptr = instance.exports.alloc(bytes.length);
          new Uint8Array(mem.buffer, ptr, bytes.length).set(bytes);
          try { instance.exports.__router_navigate(ptr, bytes.length); }
          catch(err) { console.error('[nav error]', err); }
          // Update active state
          nav.querySelectorAll('.ph-nav-item-active').forEach(el => {
            el.className = 'ph-nav-item';
          });
          link.className = 'ph-nav-item-active';
        });
      }
    } catch (e) {
      document.getElementById('app').innerHTML =
        '<div style="padding:48px;max-width:600px;margin:0 auto;font-family:Inter,sans-serif">' +
        '<h1 style="color:#303234;margin-bottom:16px">PayHive</h1>' +
        '<p style="color:#EF4444;margin-bottom:8px">WASM init error:</p>' +
        '<pre style="color:#6B7280;font-size:13px;white-space:pre-wrap">' + e.message + '</pre></div>';
      console.error(e);
    }
  </script>
</body>
</html>
